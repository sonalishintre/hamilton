# pre-commit hooks require a user to have installed `prek`:
#   $ brew install prek
# Then install the hooks within the repo:
#   $ cd /PATH/TO/REPO
#   $ prek install
exclude: '^docs/code-comparisons/'  # skip the code comparisons directory
default_stages: [pre-commit, pre-merge-commit]
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.14
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        # args: [ --diff ]  # Use for previewing changes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      # ensures files are either empty or end with a blank line
      - id: end-of-file-fixer
      # sorts requirements
      - id: requirements-txt-fixer
      # valid python file
      - id: check-ast
      - id: check-toml
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: insert-license
        name: Add license for all Python files
        files: \.py$|\.pyi$
        exclude: |
          (?x)
          ^\.github/|
          ^docs/|
          ^examples/|
          ^dev_tools/language_server/tests/ls_setup\.py$|
          ^hamilton/experimental/databackend.py$
        args:
          - --comment-style
          - "|#|"
          - --license-filepath
          - scripts/ci/license-templates/LICENSE
          - --fuzzy-match-generates-todo
      - id: insert-license
        name: Add license for all YAML files
        files: \.ya?ml$
        types: [yaml]
        exclude: |
          (?x)
          ^\.github/|
          ^docs/|
          ^examples/
        args:
          - --comment-style
          - "|#|"
          - --license-filepath
          - scripts/ci/license-templates/LICENSE
          - --fuzzy-match-generates-todo
      - id: insert-license
        name: Add license for all TOML files
        files: \.toml$
        exclude: |
          (?x)
          ^\.github/|
          ^docs/|
          ^examples/
        args:
          - --comment-style
          - "|#|"
          - --license-filepath
          - scripts/ci/license-templates/LICENSE
          - --fuzzy-match-generates-todo
      - id: insert-license
        name: Add license for all Shell files
        files: \.bash$|\.sh$
        exclude: |
          (?x)
          ^\.github/|
          ^docs/|
          ^examples/
        args:
          - --comment-style
          - "|#|"
          - --license-filepath
          - scripts/ci/license-templates/LICENSE
          - --fuzzy-match-generates-todo
      - id: insert-license
        name: Add license for all Markdown files
        files: \.md$
        exclude: |
          (?x)
          ^\.github/.*\.md$|
          ^\.claude-plugin/.*SKILL\.md$|
          ^docs/|
          ^contrib/docs/|
          ^examples/|
          ^scripts/ci/license-templates/
        args:
          - --comment-style
          - "<!--|| -->"
          - --license-filepath
          - scripts/ci/license-templates/LICENSE
          - --fuzzy-match-generates-todo
      - id: insert-license
        name: Add short license for agentic Markdown files
        files: |
          (?x)
          ^\.github/.*\.md$|
          ^\.claude-plugin/.*SKILL\.md$
        exclude: |
          (?x)
          ^\.github/ISSUE_TEMPLATE/|
          ^scripts/ci/license-templates/
        args:
          - --comment-style
          - "||"
          - --license-filepath
          - scripts/ci/license-templates/SHORT_LICENSE.md
          - --detect-license-in-X-top-lines
          - '8'
          - --fuzzy-match-generates-todo
  - repo: local
    hooks:
      - id: validate-example-notebooks
        name: validate example notebooks
        entry: python ./examples/validate_examples.py  # script is called from root directory
        language: python  # script requires the Python interpreter
        require_serial: true  # don't run in parallel because one call of the script parses all files
        additional_dependencies: [nbformat]  # Python dependency for the script
        files: ^examples/.*\.ipynb$  # this catches all .ipynb under examples/
        types: [jupyter]  # jupyter is alias for .ipynb files
